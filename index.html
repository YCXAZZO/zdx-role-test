<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>🎉星途璀璨🎉</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        /* ============================================================
           CSS 变量（浅色为默认，深色在 media 中覆盖）
           ============================================================ */
        :root {
            --bg-body: linear-gradient(145deg, #D6F2D5 0%, #F2CDC4 50%, #ffd2d4 100%);
            --bg-app: rgba(255, 255, 255, 0.70);
            --bg-card: rgba(255, 255, 255, 0.50);
            --bg-card-light: rgba(255, 255, 255, 0.30);
            --bg-modal: #ffffff;
            --bg-divider: #f0efec;
            --bg-option: rgba(255, 255, 255, 0.65);
            --bg-option-hover: rgba(255, 255, 255, 0.85);
            --bg-role-picker: #f5f5f5;

            --text-primary: #4a2c5e;
            --text-secondary: #7a5a8a;
            --text-dark: #2d1a3a;
            --text-muted: #999;
            --text-inverse: #fff;

            --border-light: rgba(255, 255, 255, 0.50);
            --border-divider: #e8e7e3;

            --shadow-card: 0 30px 60px rgba(120, 80, 150, 0.18);
            --shadow-hover: 0 10px 30px rgba(120, 80, 150, 0.08);
            --shadow-modal: 0 30px 60px rgba(0, 0, 0, 0.40);

            --accent: #F2CDC4;
            --accent-hover: #e8b8ae;
            --accent-secondary: #D6F2D5;
            --modal-overlay: rgba(0, 0, 0, 0.60);

            --bgm-color: #6a4a7a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #1a1614;
                --bg-app: rgba(30, 30, 30, 0.85);
                --bg-card: rgba(50, 50, 50, 0.70);
                --bg-card-light: rgba(60, 60, 60, 0.50);
                --bg-modal: #2a2522;
                --bg-divider: #3d3530;
                --bg-option: rgba(60, 60, 60, 0.70);
                --bg-option-hover: rgba(80, 80, 80, 0.80);
                --bg-role-picker: #3d3530;
                --text-primary: #e0d6e8;
                --text-secondary: #b0a0b8;
                --text-dark: #d0c8d8;
                --text-muted: #8a7773;
                --text-inverse: #fff;
                --border-light: rgba(255, 255, 255, 0.10);
                --border-divider: #4a403a;
                --shadow-card: 0 30px 60px rgba(0, 0, 0, 0.40);
                --shadow-hover: 0 10px 30px rgba(0, 0, 0, 0.20);
                --shadow-modal: 0 30px 60px rgba(0, 0, 0, 0.60);
                --accent: #c4a89e;
                --accent-hover: #b3968a;
                --accent-secondary: #6f8f6e;
                --modal-overlay: rgba(0, 0, 0, 0.80);
                --bgm-color: #b0a0b8;
            }
        }

        /* ============================================================
           全局重置与基础
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-body);
            padding: 20px;
            margin: 0;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .app {
            width: 100%;
            max-width: 520px;
            background: var(--bg-app);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 32px 28px 36px;
            box-shadow: var(--shadow-card), var(--shadow-hover);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .app::before,
        .app::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .app::before {
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
        }
        .app::after {
            bottom: -80px;
            left: -80px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%);
        }
        .app>* {
            position: relative;
            z-index: 1;
        }

        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.45s ease forwards;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(18px)
            }
            100% {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ===== 按钮配色 ===== */
        .btn-primary {
            display: inline-block;
            background: var(--accent);
            color: var(--text-inverse);
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 24px rgba(242, 205, 196, 0.35);
            letter-spacing: .5px;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
            box-shadow: 0 12px 32px rgba(242, 205, 196, 0.45);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: var(--bg-card);
            backdrop-filter: blur(4px);
            border: 1.5px solid var(--accent-secondary);
            color: var(--text-primary);
            padding: 12px 36px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s ease;
            box-shadow: 0 4px 12px rgba(214, 242, 213, 0.10);
        }
        .btn-secondary:hover {
            background: var(--bg-option-hover);
            transform: translateY(-2px);
        }

        .btn-action {
            min-width: 120px;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s ease;
            border: none;
            text-align: center;
        }
        .btn-action.primary {
            background: var(--accent);
            color: var(--text-inverse);
            box-shadow: 0 6px 20px rgba(242, 205, 196, 0.30);
        }
        .btn-action.primary.active {
            opacity: 1;
            pointer-events: auto;
        }
        .btn-action.primary.active:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
            box-shadow: 0 10px 28px rgba(242, 205, 196, 0.40);
        }
        .btn-action.primary:active {
            transform: scale(0.96);
        }
        .btn-action.secondary {
            background: var(--bg-card);
            backdrop-filter: blur(4px);
            border: 1.5px solid var(--accent-secondary);
            color: var(--text-primary);
            box-shadow: 0 4px 12px rgba(214, 242, 213, 0.10);
        }
        .btn-action.secondary:hover {
            background: var(--bg-option-hover);
            transform: translateY(-2px);
        }

        /* ===== 开始页 ===== */
        #page-start {
            text-align: center;
            padding: 12px 0 6px;
        }
        .hero-icon {
            display: block;
            width: 240px;
            height: 240px;
            margin: 0 auto 10px;
            border-radius: 50%;
            object-fit: cover;
        }
        .hero-icon-link {
            display: inline-block;
            text-decoration: none;
        }
        .test-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .test-subtitle {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            opacity: 0.80;
            margin-bottom: 16px;
            font-weight: 400;
        }
        .intro-desc {
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.7;
            margin: 8px 0 28px;
            padding: 0 6px;
            opacity: 0.85;
        }

        /* ===== 答题页 ===== */
        #page-quiz {
            padding: 4px 0;
        }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(242, 205, 196, 0.20);
            border-radius: 12px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 12px;
            transition: width .35s ease;
        }
        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 50px;
            text-align: right;
            opacity: 0.80;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .question-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: .5px;
        }
        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.5;
            margin-bottom: 24px;
            min-height: 56px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option-item {
            background: var(--bg-option);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(242, 205, 196, 0.20);
            border-radius: 18px;
            padding: 16px 20px;
            font-size: 16px;
            color: var(--text-dark);
            cursor: pointer;
            transition: all .20s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .option-item:hover {
            background: var(--bg-option-hover);
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .option-item .letter {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(242, 205, 196, 0.15);
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            transition: .20s;
        }
        .option-item.selected {
            border-color: var(--accent);
            background: rgba(242, 205, 196, 0.18);
            box-shadow: 0 4px 16px rgba(242, 205, 196, 0.15);
        }
        .option-item.selected .letter {
            background: var(--accent);
            color: #fff;
        }
        .option-item:active {
            transform: scale(0.97);
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .btn-action {
            flex: 1;
        }
        .btn-action.primary {
            flex: 2;
        }

        /* ===== 结果页 ===== */
        #page-result {
            text-align: center;
            padding: 8px 0 4px;
        }
        .result-badge {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .result-name-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 2px;
        }
        .result-name {
            font-size: 30px;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            display: inline-block;
            border-bottom: 2px dashed rgba(242, 205, 196, 0.3);
            padding-bottom: 2px;
            transition: border-color .2s;
        }
        .result-name:hover {
            border-color: var(--accent);
        }
        .result-hint {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.75;
            margin-top: 2px;
            letter-spacing: .3px;
        }
        .hero-hint {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.7;
            margin-top: 4px;
            letter-spacing: 0.3px;
            text-align: center;
        }
        .result-drama {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 6px;
        }
        .result-image {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin: 12px auto 16px;
            display: block;
            box-shadow: 0 12px 40px rgba(242, 205, 196, 0.25);
            border: 4px solid rgba(255, 255, 255, 0.70);
            background: #f3e5f5;
        }
        .result-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 12px;
            margin-bottom: 14px;
        }
        .result-tags span {
            background: rgba(242, 205, 196, 0.20);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .result-bg {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text-dark);
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px 18px;
            margin: 12px 0 10px;
            text-align: left;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }
        .result-bg strong {
            color: var(--text-secondary);
        }
        .result-signature {
            font-size: 17px;
            font-style: italic;
            color: var(--text-secondary);
            background: rgba(242, 205, 196, 0.15);
            border-radius: 20px;
            padding: 12px 18px;
            margin: 10px 0 12px;
            text-align: center;
            backdrop-filter: blur(4px);
            border-left: 3px solid var(--accent);
            border-right: 3px solid var(--accent);
        }
        .result-story {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-dark);
            background: var(--bg-card-light);
            border-radius: 20px;
            padding: 16px 18px;
            margin: 0 0 20px;
            text-align: left;
            backdrop-filter: blur(4px);
        }
        .radar-container {
            width: 100%;
            max-width: 320px;
            margin: 16px auto 20px;
            background: var(--bg-card-light);
            border-radius: 20px;
            padding: 12px;
        }
        .radar-container canvas {
            width: 100% !important;
            height: auto !important;
        }

        /* ===== 双栏鸣谢 ===== */
        .result-credits {
            margin: 18px 0 16px;
            padding: 10px 14px 10px 50px;
            border-radius: 16px;
            background: var(--bg-card-light);
            backdrop-filter: blur(4px);
            font-size: 18px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            border: 1px solid var(--border-light);
        }
        .credits-left,
        .credits-right {
            flex: 1 1 40%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .credits-left span,
        .credits-right span {
            display: inline-block;
        }
        .copy-hint {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.7;
            margin-top: 4px;
            margin-left: 70px;
            letter-spacing: 0.3px;
        }
        #copyAccount {
            cursor: pointer;
            transition: color 0.2s;
        }
        #copyAccount:hover {
            color: #b388c9;
        }
        #roadmapTrigger {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.7;
            transition: opacity 0.2s;
            margin-left: 6px;
            border-bottom: 1px dashed var(--text-secondary);
        }
        #roadmapTrigger:hover {
            opacity: 1;
            color: #b388c9;
        }
        @media (max-width: 480px) {
            .credits-left,
            .credits-right {
                flex: 1 1 100%;
            }
            .credits-right {
                order: -1;
            }
        }
        .result-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 10px;
        }

        /* ===== 访客计数器 ===== */
        .visit-counter {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .visit-counter span {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ===== 模态框（Swiper 容器） ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            transform: scale(0.95);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }
        .modal-content {
            background: transparent;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-modal);
            position: relative;
        }
        .modal-content .swiper-container {
            width: auto;
            height: auto;
            max-height: 80vh;
            aspect-ratio: 4 / 3;
            background: transparent;
            border-radius: 24px;
        }
        .modal-content .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }
        .modal-content .swiper-slide img {
            width: auto;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
            display: block;
        }
        .modal-content .swiper-pagination {
            position: absolute;
            bottom: 16px;
            left: 0;
            width: 100%;
            text-align: center;
        }
        .modal-content .swiper-pagination-bullet {
            background: rgba(255, 255, 255, 0.6);
            opacity: 0.8;
        }
        .modal-content .swiper-pagination-bullet-active {
            background: var(--accent);
            opacity: 1;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: transform .2s;
            z-index: 20;
            background: rgba(0, 0, 0, 0.3);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .modal-close:hover {
            transform: rotate(90deg);
            background: rgba(0, 0, 0, 0.5);
        }

        /* ===== 临时测试按钮（移到左上角，避免与音乐按钮冲突） ===== */
        #devSkipBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            z-index: 9999;
            background: transparent;
            border: none;
            color: transparent;
            cursor: default;
            padding: 0;
            opacity: 0;
            pointer-events: auto;
        }
        #devSkipBtn:hover {
            opacity: 0.2;
            background: #ff6b6b;
            border-radius: 50%;
        }
        @media (max-width:480px) {
            #devSkipBtn {
                top: 8px;
                left: 8px;
                width: 34px;
                height: 34px;
            }
        }

        /* ===== 角色选择器 ===== */
        .role-picker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            padding: 20px;
        }
        .role-picker-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .role-picker-content {
            background: var(--bg-modal);
            border-radius: 24px;
            padding: 30px 24px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-modal);
            position: relative;
            color: var(--text-primary);
        }
        .role-picker-close {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            z-index: 1;
        }
        .role-picker-close:hover {
            color: var(--text-primary);
        }
        .role-picker-content h2 {
            margin-top: 0;
            font-size: 20px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-divider);
            padding-bottom: 10px;
        }
        .role-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }
        .role-list button {
            background: var(--bg-role-picker);
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        .role-list button:hover {
            background: var(--accent);
            color: var(--text-inverse);
        }

        /* ===== Toast ===== */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;

    <script>
        // =============================================================
        // 主程序
        // =============================================================
        (async function () {
            'use strict';

            // ---------- 加载数据 ----------
            let DATA, roadmapData;
            try {
                const [dataResp, roadmapResp] = await Promise.all([
                    fetch('./data.json'),
                    fetch('/api/roadmap')
                ]);
                if (!dataResp.ok) throw new Error('加载 data.json 失败');
                if (!roadmapResp.ok) throw new Error('加载 roadmap 数据失败');
                DATA = await dataResp.json();
                roadmapData = await roadmapResp.json();
                if (typeof roadmapData !== 'object' || Array.isArray(roadmapData)) {
                    roadmapData = {};
                }
                Object.keys(roadmapData).forEach(key => {
                    if (!Array.isArray(roadmapData[key])) {
                        roadmapData[key] = [];
                    }
                });
            } catch (error) {
                console.error('数据加载失败:', error);
                document.querySelector('.intro-desc').innerHTML = '⚠️ 数据加载失败，请刷新重试。';
                return;
            }

            const rolePriority = DATA.rolePriority;
            const roleData = DATA.roleData;
            const questions = DATA.questionList;
            const totalQ = questions.length;
            const singleScore = DATA.rule.singleScore;

            // ---------- DOM 引用 ----------
            const $ = (s) => document.querySelector(s);
            const pageStart = $('#page-start');
            const pageQuiz = $('#page-quiz');
            const pageResult = $('#page-result');
            const btnStart = $('#btnStart');
            const btnNext = $('#btnNext');
            const btnBack = $('#btnBack');
            const btnRetry = $('#btnRetry');
            const progressFill = $('#progressFill');
            const progressText = $('#progressText');
            const questionNumber = $('#questionNumber');
            const questionText = $('#questionText');
            const optionsList = $('#optionsList');
            const resultName = $('#resultName');
            const resultDrama = $('#resultDrama');
            const resultImage = $('#resultImage');
            const resultTags = $('#resultTags');
            const resultBg = $('#resultBg');
            const resultStory = $('#resultStory');
            const resultSignature = $('#resultSignature');
            const introText = $('#introText');
            const modalOverlay = $('#modalOverlay');
            const swiperContainer = $('#swiperContainer');
            const swiperWrapper = $('#swiperWrapper');
            const rolePicker = $('#rolePicker');
            const roleList = $('#roleList');
            const roadmapModal = $('#roadmapModal');
            const roadmapList = $('#roadmapList');

            // ---------- BGM 相关 DOM 和状态 ----------
            const bgmAudio = document.getElementById('bgmAudio');
            const bgmToggle = document.getElementById('bgmToggle');
            const bgmIcon = document.getElementById('bgmIcon');
            let bgmPlaying = false;
            let bgmUserClosed = localStorage.getItem('userCloseBgm') === '1';
            let bgmAutoPaused = sessionStorage.getItem('bgmAutoPause') === '1';

            // ---------- Swiper 实例 ----------
            let swiperInstance = null;

            // ---------- 特质提取 ----------
            function extractTraits() {
                const freq = {};
                rolePriority.forEach(id => {
                    const tags = roleData[id].tags.split(/[、，,\s]+/).filter(t => t.trim());
                    tags.forEach(t => {
                        const key = t.trim();
                        freq[key] = (freq[key] || 0) + 1;
                    });
                });
                return Object.keys(freq).sort((a, b) => freq[b] - freq[a]).slice(0, 6);
            }
            const traitDimensions = extractTraits();
            const roleTraits = {};
            rolePriority.forEach(id => {
                const tags = roleData[id].tags.split(/[、，,\s]+/).filter(t => t.trim());
                roleTraits[id] = tags.map(t => t.trim());
            });

            // ---------- 状态 ----------
            let currentIndex = 0,
                scores = {},
                selectedOptionIndex = null,
                history = [],
                isAutoJumping = false;

            function resetScores() { scores = {}; rolePriority.forEach(id => { scores[id] = 0; }); }
            introText.innerHTML = DATA.introText;

            function recalcScores() {
                resetScores();
                for (let i = 0; i < history.length; i++) {
                    const optIdx = history[i];
                    if (optIdx === -1) continue;
                    const opt = questions[i].options[optIdx];
                    if (opt && opt.scoreRole) scores[opt.scoreRole] = (scores[opt.scoreRole] || 0) + singleScore;
                }
            }

            function getTraitScores() {
                const traitScores = {};
                traitDimensions.forEach(t => traitScores[t] = 0);
                rolePriority.forEach(id => {
                    const roleScore = scores[id] || 0;
                    (roleTraits[id] || []).forEach(t => { if (traitScores[t] !== undefined) traitScores[t] += roleScore; });
                });
                return traitScores;
            }

            // ---------- BGM 功能 ----------
            function updateBgmIcon() {
                if (bgmUserClosed) {
                    bgmIcon.textContent = '🔇';
                    bgmIcon.className = 'icon muted';
                    return;
                }
                if (bgmPlaying) {
                    bgmIcon.textContent = '🎵';
                    bgmIcon.className = 'icon playing';
                } else {
                    bgmIcon.textContent = '🎵';
                    bgmIcon.className = 'icon paused';
                }
            }

            function tryPlayBgm() {
                if (bgmUserClosed) return;
                if (bgmAutoPaused) return;
                bgmAudio.play().then(() => {
                    bgmPlaying = true;
                    updateBgmIcon();
                }).catch(() => {});
            }

            function toggleBgm() {
                if (bgmUserClosed) {
                    bgmUserClosed = false;
                    localStorage.removeItem('userCloseBgm');
                    sessionStorage.removeItem('bgmAutoPause');
                    bgmAutoPaused = false;
                    tryPlayBgm();
                    return;
                }
                if (bgmPlaying) {
                    bgmAudio.pause();
                    bgmPlaying = false;
                    bgmUserClosed = true;
                    localStorage.setItem('userCloseBgm', '1');
                    sessionStorage.removeItem('bgmAutoPause');
                    bgmAutoPaused = false;
                    updateBgmIcon();
                } else {
                    bgmUserClosed = false;
                    localStorage.removeItem('userCloseBgm');
                    sessionStorage.removeItem('bgmAutoPause');
                    bgmAutoPaused = false;
                    tryPlayBgm();
                }
            }

            bgmToggle.addEventListener('click', toggleBgm);
            updateBgmIcon();

            // ---------- 题目渲染 ----------
            function renderQuestion() {
                const q = questions[currentIndex];
                if (!q) return;
                const progress = (currentIndex / totalQ) * 100;
                progressFill.style.width = progress + '%';
                progressText.textContent = `${currentIndex + 1} / ${totalQ}`;
                questionNumber.textContent = `第 ${currentIndex + 1} 题`;
                btnBack.style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
                questionText.textContent = q.question;
                optionsList.innerHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                q.options.forEach((opt, idx) => {
                    const div = document.createElement('div');
                    div.className = 'option-item';
                    div.dataset.index = idx;
                    div.dataset.scoreRole = opt.scoreRole;
                    const letterSpan = document.createElement('span');
                    letterSpan.className = 'letter';
                    letterSpan.textContent = letters[idx] || '•';
                    const textSpan = document.createElement('span');
                    textSpan.textContent = opt.text;
                    div.appendChild(letterSpan);
                    div.appendChild(textSpan);
                    div.addEventListener('click', function () { selectOption(this); });
                    optionsList.appendChild(div);
                });
                const savedIdx = history[currentIndex];
                if (savedIdx !== undefined && savedIdx !== -1) {
                    const items = optionsList.querySelectorAll('.option-item');
                    if (items[savedIdx]) {
                        items[savedIdx].classList.add('selected');
                        selectedOptionIndex = savedIdx;
                        btnNext.classList.add('active');
                    } else {
                        selectedOptionIndex = null;
                        btnNext.classList.remove('active');
                    }
                } else {
                    selectedOptionIndex = null;
                    btnNext.classList.remove('active');
                }
                btnNext.textContent = (currentIndex === totalQ - 1 && selectedOptionIndex !== null) ? '查看结果' : '下一题 →';
            }

            function selectOption(el) {
                if (isAutoJumping) return;
                optionsList.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
                el.classList.add('selected');
                const allItems = optionsList.querySelectorAll('.option-item');
                const idx = Array.from(allItems).indexOf(el);
                selectedOptionIndex = idx;
                history[currentIndex] = idx;
                recalcScores();
                btnNext.classList.add('active');
                if (currentIndex === totalQ - 1) btnNext.textContent = '查看结果';
                isAutoJumping = true;
                setTimeout(() => {
                    isAutoJumping = false;
                    if (currentIndex < totalQ - 1) goToNext();
                }, 500);
            }

            function goToNext() {
                if (selectedOptionIndex === null) return;
                if (currentIndex === totalQ - 1) { showResult(); return; }
                currentIndex++;
                renderQuestion();
                document.querySelector('.app').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function goBack() {
                if (currentIndex === 0) return;
                currentIndex--;
                renderQuestion();
                document.querySelector('.app').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function getTopRole() {
                let max = -1,
                    top = rolePriority[0];
                for (const id of rolePriority) {
                    if (scores[id] > max) {
                        max = scores[id];
                        top = id;
                    }
                }
                return top;
            }

            // -------- 显示结果 --------
            function showResult() {
                if (selectedOptionIndex !== null && history[currentIndex] === undefined) {
                    history[currentIndex] = selectedOptionIndex;
                    recalcScores();
                }
                const topId = getTopRole();
                const role = roleData[topId];
                if (!role) return;
                pageQuiz.classList.add('hidden');
                pageResult.classList.remove('hidden');
                pageResult.classList.add('fade-in');
                resultName.textContent = role.roleName;
                resultDrama.textContent = `「${role.dramaName}」`;
                resultImage.src = role.image || `https://picsum.photos/seed/${topId}/400/400`;
                resultImage.alt = role.roleName;
                resultTags.innerHTML = role.tags.split('、').map(t => `<span># ${t}</span>`).join('');
                resultBg.innerHTML = `<strong>🧠 人格底色</strong><br>${role.personalityBg}`;
                resultSignature.innerHTML = role.signatureLine || '';
                resultStory.innerHTML = `<strong>📖 角色故事</strong><br>${role.resultText}`;
                drawRadarChart();
                resultName.onclick = function () { openCardModal(topId); };

                const copyEl = document.getElementById('copyAccount');
                if (copyEl) {
                    copyEl.onclick = function (e) {
                        e.stopPropagation();
                        copyText('赵黛溪Daisy');
                    };
                }
            }

            // -------- 复制功能 --------
            function copyText(text) {
                const toast = document.getElementById('toast');
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('✅ 已复制 ' + text);
                    }).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ 已复制 ' + text);
                } catch (e) {
                    alert('复制失败，请手动复制');
                }
                document.body.removeChild(input);
            }

            function showToast(msg) {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // -------- 雷达图 --------
            function drawRadarChart() {
                const canvas = document.getElementById('radarChart');
                if (!canvas) return;
                if (window.myRadarChart) { window.myRadarChart.destroy(); }
                const traitScores = getTraitScores();
                const values = traitDimensions.map(t => traitScores[t] || 0);
                const maxVal = Math.max(...values, 10);
                const axisMax = Math.ceil(maxVal / 10) * 10;
                const ctx = canvas.getContext('2d');
                window.myRadarChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: traitDimensions,
                        datasets: [{
                            label: '性格特质契合度',
                            data: values,
                            backgroundColor: 'rgba(242, 205, 196, 0.25)',
                            borderColor: 'var(--accent)',
                            borderWidth: 2,
                            pointBackgroundColor: 'var(--accent-secondary)',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 1,
                            pointRadius: 4,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: Math.max(axisMax, 50),
                                ticks: {
                                    display: false, stepSize: Math.ceil(axisMax / 5), backdropColor: 'transparent',
                                    font: { size: 10 }
                                },
                                grid: { color: 'rgba(242, 205, 196, 0.2)' },
                                pointLabels: { font: { size: 12, weight: '500' }, color: 'var(--text-primary)' }
                            }
                        }
                    }
                });
            }

            // -------- 剧照弹窗（Swiper Flip 效果） --------
            function openCardModal(roleId) {
                const role = roleData[roleId];
                if (!role) return;

                let imageList = [];
                if (role.cards && Array.isArray(role.cards) && role.cards.length > 0) {
                    imageList = role.cards;
                } else if (role.card) {
                    imageList = [role.card];
                } else {
                    imageList = [`https://picsum.photos/seed/${roleId}_card/800/600`];
                }

                swiperWrapper.innerHTML = '';
                imageList.forEach((url, idx) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = `${role.roleName} 剧照 ${idx + 1}`;
                    slide.appendChild(img);
                    swiperWrapper.appendChild(slide);
                });

                modalOverlay.classList.remove('hidden');
                void modalOverlay.offsetWidth;
                modalOverlay.classList.add('active');

                if (swiperInstance) {
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }

                swiperInstance = new Swiper(swiperContainer, {
                    effect: 'flip',
                    flipEffect: {
                        slideShadows: false,
                        limitRotation: true,
                    },
                    pagination: {
                        el: '#swiperPagination',
                        clickable: true,
                    },
                    grabCursor: true,
                    touchEventsTarget: 'container',
                    allowTouchMove: imageList.length > 1,
                    autoHeight: false,
                });
            }

            window.closeModal = function (e) {
                if (e && e.target !== e.currentTarget) return;
                modalOverlay.classList.remove('active');
                setTimeout(() => {
                    modalOverlay.classList.add('hidden');
                    if (swiperInstance) {
                        swiperInstance.destroy(true, true);
                        swiperInstance = null;
                    }
                    swiperWrapper.innerHTML = '';
                }, 300);
            };

            // -------- 角色选择器（调试功能） --------
            function openRolePicker() {
                roleList.innerHTML = '';
                rolePriority.forEach(id => {
                    const role = roleData[id];
                    const btn = document.createElement('button');
                    btn.textContent = `${role.roleName}（${role.dramaName}）`;
                    btn.addEventListener('click', function () {
                        showRoleResult(id);
                        closeRolePicker();
                    });
                    roleList.appendChild(btn);
                });
                rolePicker.classList.remove('hidden');
                void rolePicker.offsetWidth;
                rolePicker.classList.add('active');
            }

            function closeRolePicker(e) {
                if (e) {
                    const target = e.target;
                    if (target === e.currentTarget || target.classList.contains('role-picker-close')) {
                        // 执行关闭
                    } else {
                        return;
                    }
                }
                rolePicker.classList.remove('active');
                setTimeout(() => {
                    rolePicker.classList.add('hidden');
                }, 300);
            }

            function showRoleResult(roleId) {
                const role = roleData[roleId];
                if (!role) return;

                pageQuiz.classList.add('hidden');
                pageStart.classList.add('hidden');
                pageResult.classList.remove('hidden');
                pageResult.classList.add('fade-in');

                resultName.textContent = role.roleName;
                resultDrama.textContent = `「${role.dramaName}」`;
                resultImage.src = role.image || `https://picsum.photos/seed/${roleId}/400/400`;
                resultImage.alt = role.roleName;
                resultTags.innerHTML = role.tags.split('、').map(t => `<span># ${t}</span>`).join('');
                resultBg.innerHTML = `<strong>🧠 人格底色</strong><br>${role.personalityBg}`;
                resultSignature.innerHTML = role.signatureLine || '';
                resultStory.innerHTML = `<strong>📖 角色故事</strong><br>${role.resultText}`;
                resultName.onclick = function () { openCardModal(roleId); };

                resetScores();
                scores[roleId] = 999;
                drawRadarChart();

                const copyEl = document.getElementById('copyAccount');
                if (copyEl) {
                    copyEl.onclick = function (e) {
                        e.stopPropagation();
                        copyText('赵黛溪Daisy');
                    };
                }
            }

            // -------- 重置测试 --------
            function resetTest() {
                currentIndex = 0;
                selectedOptionIndex = null;
                history = new Array(totalQ).fill(-1);
                resetScores();
                pageResult.classList.add('hidden');
                pageStart.classList.remove('hidden');
                pageStart.classList.add('fade-in');
                pageQuiz.classList.add('hidden');
                progressFill.style.width = '0%';
                progressText.textContent = `1 / ${totalQ}`;
                btnNext.classList.remove('active');
                btnNext.textContent = '下一题 →';
                if (window.myRadarChart) {
                    window.myRadarChart.destroy();
                    window.myRadarChart = null;
                }
                if (modalOverlay.classList.contains('active')) {
                    closeModal();
                }
            }

            // -------- 普通用户查看迭代路线 --------
            function openRoadmap() {
                roadmapList.innerHTML = '';
                Object.keys(roadmapData).forEach(groupName => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'roadmap-group';
                    const title = document.createElement('div');
                    title.className = 'roadmap-group-title';
                    title.textContent = groupName;
                    groupDiv.appendChild(title);
                    const items = roadmapData[groupName];
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'roadmap-item';
                        let versionDisplay = item.version;
                        if (item.title) {
                            versionDisplay = `${item.version} · ${item.title}`;
                        }
                        div.innerHTML = `
                            <div><span class="version">${versionDisplay}</span></div>
                            <ul>
                                ${item.changes.map(c => `<li>${c}</li>`).join('')}
                            </ul>
                        `;
                        groupDiv.appendChild(div);
                    });
                    roadmapList.appendChild(groupDiv);
                });
                roadmapModal.classList.remove('hidden');
                void roadmapModal.offsetWidth;
                roadmapModal.classList.add('active');
            }

            function closeRoadmap(e) {
                if (e && e.target !== e.currentTarget) return;
                roadmapModal.classList.remove('active');
                setTimeout(() => {
                    roadmapModal.classList.add('hidden');
                }, 300);
            }
            window.closeRoadmap = closeRoadmap;

            // -------- 管理面板 ----------
            let currentGroup = null;

            window.openAdminPanel = function (password) {
                window._adminPassword = password;
                const panel = document.getElementById('adminPanel');
                panel.style.display = 'flex';
                requestAnimationFrame(() => {
                    panel.classList.add('active');
                });
                renderAdminRoleList();
                renderRoadmapGroupTabs();
            };

            window.closeAdminPanel = function (e) {
                if (e && e.target !== e.currentTarget) return;
                const panel = document.getElementById('adminPanel');
                panel.classList.remove('active');
                setTimeout(() => {
                    panel.style.display = 'none';
                }, 350);
                window._adminPassword = null;
            };

            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.addEventListener('click', function () {
                    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const target = this.dataset.tab;
                    document.querySelectorAll('.admin-tab-content').forEach(el => el.classList.add('hidden'));
                    const map = {
                        roles: 'adminTabRoles',
                        roadmap: 'adminTabRoadmap',
                        story: 'adminTabStory',
                        questions: 'adminTabQuestions'
                    };
                    document.getElementById(map[target]).classList.remove('hidden');
                    if (target === 'roadmap') {
                        renderRoadmapGroupTabs();
                    }
                });
            });

            function renderAdminRoleList() {
                const container = document.getElementById('adminRoleList');
                container.innerHTML = '';
                rolePriority.forEach(id => {
                    const role = roleData[id];
                    const btn = document.createElement('button');
                    btn.className = 'role-list-btn';
                    btn.textContent = `${role.roleName}（${role.dramaName}）`;
                    btn.addEventListener('click', function () {
                        showRoleResult(id);
                        closeAdminPanel();
                    });
                    container.appendChild(btn);
                });
            }

            function renderRoadmapGroupTabs() {
                const tabsContainer = document.getElementById('roadmapGroupTabs');
                tabsContainer.innerHTML = '';
                const groupNames = Object.keys(roadmapData);
                if (groupNames.length === 0) {
                    tabsContainer.innerHTML = '<span style="color:var(--text-muted);">暂无分组</span>';
                    return;
                }
                groupNames.forEach((name, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'roadmap-group-tab';
                    if (idx === 0) btn.classList.add('active');
                    btn.textContent = name;
                    btn.dataset.group = name;
                    btn.addEventListener('click', function () {
                        document.querySelectorAll('.roadmap-group-tab').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentGroup = this.dataset.group;
                        renderAdminRoadmapEditor(roadmapData[currentGroup]);
                    });
                    tabsContainer.appendChild(btn);
                });
                currentGroup = groupNames[0];
                renderAdminRoadmapEditor(roadmapData[currentGroup]);
            }

            function renderAdminRoadmapEditor(data) {
                const container = document.getElementById('adminRoadmapList');
                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted);">暂无版本，点击下方添加</p>';
                    return;
                }
                data.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'admin-version-item';
                    div.dataset.index = index;

                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-btn';
                    removeBtn.textContent = '✕';
                    removeBtn.title = '删除此版本';
                    removeBtn.addEventListener('click', () => {
                        data.splice(index, 1);
                        renderAdminRoadmapEditor(data);
                    });
                    div.appendChild(removeBtn);

                    const versionInput = document.createElement('input');
                    versionInput.type = 'text';
                    versionInput.placeholder = '版本号 (如 v1.0)';
                    versionInput.value = item.version || '';
                    versionInput.addEventListener('input', () => {
                        data[index].version = versionInput.value;
                    });
                    div.appendChild(versionInput);

                    const titleInput = document.createElement('input');
                    titleInput.type = 'text';
                    titleInput.placeholder = '子标题 (可选)';
                    titleInput.value = item.title || '';
                    titleInput.addEventListener('input', () => {
                        data[index].title = titleInput.value;
                    });
                    div.appendChild(titleInput);

                    const changesContainer = document.createElement('div');
                    changesContainer.style.marginTop = '6px';
                    const changes = item.changes || [];
                    changes.forEach((change, ci) => {
                        const changeDiv = document.createElement('div');
                        changeDiv.className = 'admin-change-item';
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.placeholder = '变更项';
                        input.value = change;
                        input.addEventListener('input', () => {
                            data[index].changes[ci] = input.value;
                        });
                        changeDiv.appendChild(input);
                        const removeChangeBtn = document.createElement('button');
                        removeChangeBtn.className = 'remove-change';
                        removeChangeBtn.textContent = '✕';
                        removeChangeBtn.addEventListener('click', () => {
                            data[index].changes.splice(ci, 1);
                            renderAdminRoadmapEditor(data);
                        });
                        changeDiv.appendChild(removeChangeBtn);
                        changesContainer.appendChild(changeDiv);
                    });

                    const addChangeBtn = document.createElement('button');
                    addChangeBtn.className = 'admin-add-change';
                    addChangeBtn.textContent = '+ 添加变更项';
                    addChangeBtn.addEventListener('click', () => {
                        if (!data[index].changes) data[index].changes = [];
                        data[index].changes.push('');
                        renderAdminRoadmapEditor(data);
                    });
                    changesContainer.appendChild(addChangeBtn);
                    div.appendChild(changesContainer);

                    container.appendChild(div);
                });

                const lastItem = container.lastElementChild;
                if (lastItem) {
                    lastItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            document.getElementById('addVersionBtn').addEventListener('click', function () {
                if (!currentGroup || !roadmapData[currentGroup]) {
                    alert('请先选择一个分组');
                    return;
                }
                const targetArray = roadmapData[currentGroup];
                targetArray.push({
                    version: 'v1.x',
                    title: '新版本',
                    changes: ['新功能描述']
                });
                renderAdminRoadmapEditor(targetArray);
            });

            document.getElementById('saveRoadmapBtn').addEventListener('click', async function () {
                const message = document.getElementById('adminMessage');
                message.textContent = '保存中...';
                message.style.color = 'var(--text-secondary)';

                const password = window._adminPassword;
                if (!password) {
                    message.textContent = '❌ 请重新输入密码';
                    message.style.color = '#e74c3c';
                    return;
                }

                try {
                    const resp = await fetch('/api/roadmap', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password, roadmap: roadmapData })
                    });
                    const result = await resp.json();
                    if (resp.ok) {
                        message.textContent = '✅ 保存成功！';
                        message.style.color = '#2ecc71';
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        message.textContent = '❌ 保存失败：' + (result.error || '未知错误');
                        message.style.color = '#e74c3c';
                    }
                } catch (err) {
                    message.textContent = '❌ 网络错误，请重试';
                    message.style.color = '#e74c3c';
                    console.error(err);
                }
            });

            // -------- 事件绑定 --------
            btnStart.addEventListener('click', function () {
                pageStart.classList.add('hidden');
                pageQuiz.classList.remove('hidden');
                pageQuiz.classList.add('fade-in');
                resetScores();
                history = new Array(totalQ).fill(-1);
                currentIndex = 0;
                renderQuestion();
            });
            btnNext.addEventListener('click', function () { if (btnNext.classList.contains('active')) goToNext(); });
            btnBack.addEventListener('click', goBack);
            btnRetry.addEventListener('click', resetTest);

            document.addEventListener('keydown', function (e) {
                if (e.key === 'ArrowLeft' && !pageQuiz.classList.contains('hidden') && currentIndex > 0) goBack();
                if (e.key === 'ArrowRight' && !pageQuiz.classList.contains('hidden') && btnNext.classList.contains('active'))
                    goToNext();
                if (e.key === 'Enter' && !pageQuiz.classList.contains('hidden') && btnNext.classList.contains('active'))
                    goToNext();
                if (e.key === 'Escape') {
                    if (modalOverlay.classList.contains('active')) closeModal();
                    if (rolePicker.classList.contains('active')) closeRolePicker();
                    if (roadmapModal.classList.contains('active')) closeRoadmap();
                    if (document.getElementById('adminPanel').classList.contains('active')) closeAdminPanel();
                }
            });

            document.getElementById('devSkipBtn').addEventListener('click', function () {
                const pwd = prompt('请输入管理密码：');
                if (pwd === null) return;
                if (typeof window.openAdminPanel === 'function') {
                    window.openAdminPanel(pwd);
                } else {
                    alert('管理面板加载失败，请刷新页面重试。');
                }
            });

            document.getElementById('roadmapTrigger').addEventListener('click', function (e) {
                e.stopPropagation();
                openRoadmap();
            });

            window.closeRolePicker = closeRolePicker;
            window.closeRoadmap = closeRoadmap;

            // -------- 访客计数 --------
            async function updateVisitCount() {
                try {
                    const response = await fetch('/api/visit');
                    if (!response.ok) throw new Error('网络请求失败');
                    const data = await response.json();
                    document.getElementById('visitCount').textContent = data.count;
                } catch (error) {
                    console.warn('访客计数失败:', error);
                    document.getElementById('visitCount').textContent = '?';
                }
            }
            updateVisitCount();

            // -------- 初始化 --------
            resetScores();
            rolePriority.forEach(id => {
                if (!roleData[id].image) roleData[id].image = `https://picsum.photos/seed/${id}/400/400`;
                if (!roleData[id].card) roleData[id].card = `https://picsum.photos/seed/${id}_card/800/600`;
                if (!roleData[id].cards || roleData[id].cards.length === 0) {
                    roleData[id].cards = [roleData[id].card];
                }
            });
            if (totalQ === 0) document.querySelector('.intro-desc').innerHTML = '⚠️ 题目数据为空。';

        })();
    </script>

</body>

</html>
