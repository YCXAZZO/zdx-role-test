<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>🎉黛溪宇宙🎉</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        /* ---------- 全局重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #fce4ec 0%, #f3e5f5 40%, #e8eaf6 100%);
            padding: 20px;
            margin: 0;
        }

        .app {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 32px 28px 36px;
            box-shadow: 0 30px 60px rgba(120, 80, 150, 0.18), 0 10px 30px rgba(120, 80, 150, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.50);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .app::before,
        .app::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .app::before {
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(206, 147, 216, 0.25) 0%, transparent 70%);
        }

        .app::after {
            bottom: -80px;
            left: -80px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(244, 143, 177, 0.20) 0%, transparent 70%);
        }

        .app>* {
            position: relative;
            z-index: 1;
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.45s ease forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-primary {
            display: inline-block;
            background: linear-gradient(135deg, #b388c9, #9c6fb0);
            color: #fff;
            border: none;
            padding: 14px 48px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 24px rgba(156, 111, 176, 0.35);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(156, 111, 176, 0.45);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            border: 1.5px solid #b388c9;
            color: #4a2c5e;
            padding: 12px 36px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(156, 111, 176, 0.10);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.90);
            transform: translateY(-2px);
        }

        /* 统一按钮尺寸 */
        .btn-action {
            min-width: 120px;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
            text-align: center;
        }

        .btn-action.primary {
            background: linear-gradient(135deg, #b388c9, #9c6fb0);
            color: #fff;
            box-shadow: 0 6px 20px rgba(156, 111, 176, 0.30);
        }

        .btn-action.primary.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-action.primary.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(156, 111, 176, 0.40);
        }

        .btn-action.primary:active {
            transform: scale(0.96);
        }

        .btn-action.secondary {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            border: 1.5px solid #b388c9;
            color: #4a2c5e;
            box-shadow: 0 4px 12px rgba(156, 111, 176, 0.10);
        }

        .btn-action.secondary:hover {
            background: rgba(255, 255, 255, 0.90);
            transform: translateY(-2px);
        }

        /* ---------- 开始页 ---------- */
        #page-start {
            text-align: center;
            padding: 12px 0 6px;
        }

        .hero-icon {
            font-size: 68px;
            margin-bottom: 10px;
            display: block;
        }

        .test-title {
            font-size: 26px;
            font-weight: 700;
            color: #4a2c5e;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .test-subtitle {
            text-align: center;
            font-size: 15px;
            color: #7a5a8a;
            opacity: 0.80;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .intro-desc {
            color: #4a2c5e;
            font-size: 16px;
            line-height: 1.7;
            margin: 8px 0 28px;
            padding: 0 6px;
            opacity: 0.85;
        }

        /* ---------- 答题页 ---------- */
        #page-quiz {
            padding: 4px 0;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
        }

        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(156, 111, 176, 0.20);
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b388c9, #d896b8);
            border-radius: 12px;
            transition: width 0.35s ease;
        }

        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: #4a2c5e;
            min-width: 50px;
            text-align: right;
            opacity: 0.80;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .question-number {
            font-size: 14px;
            font-weight: 600;
            color: #9c6fb0;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #2d1a3a;
            line-height: 1.5;
            margin-bottom: 24px;
            min-height: 56px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(179, 136, 201, 0.20);
            border-radius: 18px;
            padding: 16px 20px;
            font-size: 16px;
            color: #2d1a3a;
            cursor: pointer;
            transition: all 0.20s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: #b388c9;
            transform: translateX(4px);
        }

        .option-item .letter {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(179, 136, 201, 0.15);
            color: #7a5a8a;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            transition: 0.20s;
        }

        .option-item.selected {
            border-color: #9c6fb0;
            background: rgba(179, 136, 201, 0.18);
            box-shadow: 0 4px 16px rgba(156, 111, 176, 0.15);
        }

        .option-item.selected .letter {
            background: #9c6fb0;
            color: #fff;
        }

        .option-item:active {
            transform: scale(0.97);
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .btn-action {
            flex: 1;
        }

        .btn-action.primary {
            flex: 2;
        }

        /* ---------- 结果页 ---------- */
        #page-result {
            text-align: center;
            padding: 8px 0 4px;
        }

        .result-badge {
            font-size: 14px;
            font-weight: 600;
            color: #9c6fb0;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .result-name-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 2px;
        }

        .result-name {
            font-size: 30px;
            font-weight: 700;
            color: #2d1a3a;
            cursor: pointer;
            display: inline-block;
            border-bottom: 2px dashed rgba(156, 111, 176, 0.3);
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        .result-name:hover {
            border-color: #9c6fb0;
        }

        .result-hint {
            font-size: 13px;
            color: #9c6fb0;
            opacity: 0.75;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .result-drama {
            font-size: 16px;
            color: #7a5a8a;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .result-image {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin: 12px auto 16px;
            display: block;
            box-shadow: 0 12px 40px rgba(156, 111, 176, 0.25);
            border: 4px solid rgba(255, 255, 255, 0.70);
            background: #f3e5f5;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 12px;
            margin-bottom: 14px;
        }

        .result-tags span {
            background: rgba(179, 136, 201, 0.20);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #6a4a7a;
            font-weight: 500;
        }

        .result-bg {
            font-size: 16px;
            line-height: 1.7;
            color: #3d2a4a;
            background: rgba(255, 255, 255, 0.50);
            border-radius: 20px;
            padding: 16px 18px;
            margin: 12px 0 10px;
            text-align: left;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .result-bg strong {
            color: #6a4a7a;
        }

        .result-story {
            font-size: 16px;
            line-height: 1.8;
            color: #3d2a4a;
            background: rgba(255, 255, 255, 0.30);
            border-radius: 20px;
            padding: 16px 18px;
            margin: 0 0 20px;
            text-align: left;
            backdrop-filter: blur(4px);
        }

        .radar-container {
            width: 100%;
            max-width: 320px;
            margin: 16px auto 20px;
            background: rgba(255, 255, 255, 0.30);
            border-radius: 20px;
            padding: 12px;
        }

        .radar-container canvas {
            width: 100% !important;
            height: auto !important;
        }

        /* 鸣谢板块 */
        .result-credits {
            margin: 18px 0 16px;
            padding: 10px 14px 10px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(4px);
            font-size: 20px;
            color: #7a5a8a;
            display: flex;
            flex-direction: column;
            /* 纵向排列 */
            align-items: flex-start;
            /* 左对齐 */
            gap: 6px;
            /* 行间距 */
            border: 1px solid rgba(255, 255, 255, 0.20);
        }

        .result-credits span {
            display: inline-block;
        }

        .result-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 10px;
        }

        /* ---------- 模态框（显示卡片图） ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.60);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: transparent;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.40);
            position: relative;
        }

        .modal-content img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 24px;
            background: #fff;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
            z-index: 10;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        /* ---------- 海报预览 ---------- */
        #posterPreview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.60);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        #posterPreview img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.40);
            border: 4px solid #fff;
        }

        .poster-actions {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 480px) {
            .app {
                padding: 24px 18px 28px;
                border-radius: 28px;
            }

            .test-title {
                font-size: 22px;
            }

            .question-text {
                font-size: 18px;
                min-height: 48px;
            }

            .option-item {
                padding: 14px 16px;
                font-size: 15px;
            }

            .result-name {
                font-size: 26px;
            }

            .result-image {
                width: 130px;
                height: 130px;
            }

            .btn-action {
                min-width: 80px;
                padding: 10px 16px;
                font-size: 14px;
            }

            .modal-content {
                max-width: 95%;
            }
        }

        @media (max-width: 380px) {
            .app {
                padding: 18px 12px 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .option-item {
                padding: 12px 14px;
                font-size: 14px;
            }

            .result-story {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="app" id="app">

        <!-- ===== 开始页 ===== -->
        <div id="page-start" class="fade-in">
            <span class="hero-icon">🥰</span>
            <h1 class="test-title">欢迎加入黛溪宇宙</h1>
            <p class="test-subtitle">—— 你是平行时空的哪个角色？</p>
            <p class="intro-desc" id="introText"></p>
            <button class="btn-primary" id="btnStart">开始测试 →</button>
        </div>

        <!-- ===== 答题页 ===== -->
        <div id="page-quiz" class="hidden">
            <div class="progress-wrap">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:0%;"></div>
                </div>
                <span class="progress-text" id="progressText">1 / 10</span>
            </div>
            <div class="question-header">
                <span class="question-number" id="questionNumber">第 1 题</span>
            </div>
            <div class="question-text" id="questionText">题目加载中…</div>
            <div class="options-list" id="optionsList"></div>
            <div class="quiz-actions">
                <button class="btn-action secondary" id="btnBack">‹ 返回</button>
                <button class="btn-action primary" id="btnNext">下一题 →</button>
            </div>
        </div>

        <!-- ===== 结果页 ===== -->
        <div id="page-result" class="hidden">
            <div class="result-badge">✨ 你的黛溪分身</div>
            <div class="result-name-wrapper">
                <div class="result-name" id="resultName">角色名</div>
                <div class="result-hint">👆 点击角色名查看剧照</div>
            </div>
            <div class="result-drama" id="resultDrama">（剧名）</div>
            <img class="result-image" id="resultImage" src="" alt="角色插画" />
            <div class="result-tags" id="resultTags"></div>
            <div class="result-bg" id="resultBg"></div>
            <div class="result-story" id="resultStory"></div>
            <div class="radar-container">
                <canvas id="radarChart"></canvas>
            </div>

            <!-- 鸣谢板块 -->
            <div class="result-credits">
                <span>🎨 插画来源：@OsAtNb</span>
                <span>📝 内容提供：@Flipped</span>
                <span>💻 前端开发：@杨伽桉</span>
            </div>

            <div class="result-actions">
                <button class="btn-secondary" id="btnRetry">🔄 重新测试</button>
                <button class="btn-secondary" id="btnPoster">🖼️ 生成海报</button>
                <button class="btn-primary" id="btnShare" style="padding:12px 28px; font-size:15px;">📤 分享结果</button>
            </div>
        </div>

    </div>

    <!-- ===== 模态框（显示卡片图） ===== -->
    <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">×</span>
            <img id="modalCardImage" src="" alt="角色详情卡片" />
        </div>
    </div>

    <!-- ===== 海报预览 ===== -->
    <div id="posterPreview" class="hidden">
        <img id="posterImage" src="" alt="海报" />
        <div class="poster-actions">
            <button class="btn-secondary" onclick="closePoster()">关闭</button>
            <button class="btn-primary" id="btnDownloadPoster">💾 保存图片</button>
        </div>
    </div>

    <script>
        // =============================================================
        //  数据

        const DATA = {

                "hujuaner": {

                pageQuiz.classList.add('hidden');
                progressFill.style.width = '0%';
                progressText.textContent = `1 / ${totalQ}`;
                btnNext.classList.remove('active');
                btnNext.textContent = '下一题 →';
                if (window.myRadarChart) {
                    window.myRadarChart.destroy();
                    window.myRadarChart = null;
                }
            }
            // -------- 事件绑定 --------
            btnStart.addEventListener('click', function () {
                pageStart.classList.add('hidden');
                pageQuiz.classList.remove('hidden');
                pageQuiz.classList.add('fade-in');
                resetScores();
                history = new Array(totalQ).fill(-1);
                currentIndex = 0;
                renderQuestion();
            });

            btnNext.addEventListener('click', function () {
                if (btnNext.classList.contains('active')) {
                    goToNext();
                }
            });

            btnBack.addEventListener('click', goBack);

            btnRetry.addEventListener('click', resetTest);

            btnShare.addEventListener('click', shareResult);

            // -------- 生成海报（克隆截图法） --------
            // -------- 生成海报（克隆截图法，纯色背景，不透明） --------
            async function generatePoster() {
                btnPoster.textContent = '生成中…';
                btnPoster.disabled = true;

                try {
                    const resultPage = document.getElementById('page-result');

                    // 克隆
                    const clone = resultPage.cloneNode(true);
                    clone.id = 'clone-for-poster';
                    clone.style.position = 'fixed';
                    clone.style.left = '-9999px';
                    clone.style.top = '0';
                    clone.style.width = resultPage.scrollWidth + 'px';
                    // 使用纯色背景（浅紫灰），代替渐变，避免透明
                    clone.style.background = '#f8f4fa';
                    clone.style.backdropFilter = 'none';
                    clone.style.webkitBackdropFilter = 'none';
                    clone.style.padding = '20px';
                    clone.style.borderRadius = '0';
                    clone.style.boxShadow = 'none';

                    // 强制卡片背景为白色，其他元素保持透明或继承
                    clone.querySelectorAll('*').forEach(el => {
                        el.style.backdropFilter = 'none';
                        el.style.webkitBackdropFilter = 'none';
                        if (el.classList && (
                            el.classList.contains('result-bg') ||
                            el.classList.contains('result-story') ||
                            el.classList.contains('result-credits') ||
                            el.classList.contains('radar-container')
                        )) {
                            el.style.background = '#ffffff';
                        }
                        // 确保整个结果页背景透明，让克隆背景露出来
                        if (el.id === 'page-result') {
                            el.style.background = 'transparent';
                        }
                    });

                    // 二维码
                    const qrContainer = document.createElement('div');
                    qrContainer.style.position = 'absolute';
                    qrContainer.style.bottom = '20px';
                    qrContainer.style.right = '20px';
                    qrContainer.style.width = '80px';
                    qrContainer.style.height = '80px';
                    qrContainer.style.background = '#fff';
                    qrContainer.style.borderRadius = '12px';
                    qrContainer.style.padding = '4px';
                    qrContainer.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
                    qrContainer.style.zIndex = '10';
                    clone.appendChild(qrContainer);

                    new QRCode(qrContainer, {
                        text: window.location.href,
                        width: 72,
                        height: 72,
                        colorDark: '#2d1a3a',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    document.body.appendChild(clone);

                    // 截图，背景颜色设为与克隆背景一致，确保不透明
                    const canvas = await html2canvas(clone, {
                        scale: 5,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#f8f4fa',   // 与克隆背景一致
                        allowTaint: true,
                        width: clone.scrollWidth,
                        height: clone.scrollHeight,
                    });

                    document.body.removeChild(clone);

                    const dataUrl = canvas.toDataURL('image/png');
                    const posterImage = document.getElementById('posterImage');
                    posterImage.src = dataUrl;
                    posterImage.dataset.src = dataUrl;
                    document.getElementById('posterPreview').classList.remove('hidden');

                } catch (err) {
                    alert('生成海报失败，请重试。');
                    console.error(err);
                } finally {
                    btnPoster.textContent = '🖼️ 生成海报';
                    btnPoster.disabled = false;
                }
            }

            btnPoster.addEventListener('click', generatePoster);

            // -------- 下载海报 --------
            document.getElementById('btnDownloadPoster').addEventListener('click', function () {
                const posterImage = document.getElementById('posterImage');
                const dataUrl = posterImage.dataset.src || posterImage.src;
                if (!dataUrl || dataUrl === '' || dataUrl === window.location.href) {
                    alert('请先生成海报！');
                    return;
                }
                const link = document.createElement('a');
                link.download = '角色人格测试海报.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            // -------- 键盘快捷键 --------
            document.addEventListener('keydown', function (e) {
                if (e.key === 'ArrowLeft' && !pageQuiz.classList.contains('hidden')) {
                    if (currentIndex > 0) goBack();
                }
                if (e.key === 'ArrowRight' && !pageQuiz.classList.contains('hidden')) {
                    if (btnNext.classList.contains('active')) goToNext();
                }
                if (e.key === 'Enter' && !pageQuiz.classList.contains('hidden')) {
                    if (btnNext.classList.contains('active')) goToNext();
                }
                if (e.key === 'Escape') {
                    if (!modalOverlay.classList.contains('hidden')) closeModal();
                    if (!posterPreview.classList.contains('hidden')) closePoster();
                }
            });

            // -------- 初始化 --------
            resetScores();
            rolePriority.forEach(id => {
                if (!roleData[id].image) {
                    roleData[id].image = `https://picsum.photos/seed/${id}/400/400`;
                }
                if (!roleData[id].card) {
                    roleData[id].card = roleData[id].still || `https://picsum.photos/seed/${id}_card/800/600`;
                }
            });
            if (totalQ === 0) {
                document.querySelector('.intro-desc').innerHTML = '⚠️ 题目数据为空。';
            }
        })();
    </script>

</body>

</html>
